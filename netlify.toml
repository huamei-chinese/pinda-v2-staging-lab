[build]
  publish = "public"
  command = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."daily-reminders"]
  schedule = "0 0 * * *"

[[redirects]]
  from = "/listening-app"
  to = "/listening-app/index.html"
  status = 200

[[redirects]]
  from = "/listening-app/"
  to = "/listening-app/index.html"
  status = 200

[[redirects]]
  from = "/listening-app/:splat/"
  to = "/listening-app/:splat.html"
  status = 200

[[redirects]]
  from = "/listening-app/:splat"
  to = "/listening-app/:splat.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=604800"

[[headers]]
  for = "/listening-app/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=604800"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=604800"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
