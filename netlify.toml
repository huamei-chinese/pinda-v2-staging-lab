[build]
  publish = "netlify-mail-public"
  command = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions.api]
  included_files = [
    "public/listening-app/data/listening-catalog.json",
    "public/lesson-high-frequency-v1-27-topics.js",
    "public/lesson-high-frequency-topics.js",
    "public/lesson-high-frequency-topic-unit.js"
  ]

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"
