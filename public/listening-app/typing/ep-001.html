ed\":true},{\"sentence_id\":\"ep-001-s3\",\"chinese\":\"不是。我看到很多朋友都过得很好，可是我好像还没有什么变化。\",\"pinyin\":\"Bú shì. Wǒ kàndào hěn duō péngyou dōu guò de hěn hǎo, kěshì wǒ hǎoxiàng hái méiyǒu shénme biànhuà.\",\"vietnamese\":\"Không phải. Tôi thấy nhiều bạn bè sống rất tốt, nhưng hình như tôi vẫn chưa có thay đổi gì.\",\"start\":8.34,\"end\":18.38,\"is_shadowing_enabled\":true},{\"sentence_id\":\"ep-001-s4\",\"chinese\":\"你是不是又在和别人比？\",\"pinyin\":\"Nǐ shì bú shì yòu zài hé biérén bǐ?\",\"vietnamese\":\"Có phải bạn lại đang so sánh mình với người khác không?\",\"start\":18.38,\"end\":22.35,\"is_shadowing_enabled\":true},{\"sentence_id\":\"ep-001-s5\",\"chinese\":\"可能是吧。看到他们越来越好，我就觉得自己进步得很慢。\",\"pinyin\":\"Kěnéng shì ba. Kàndào tāmen yuè lái yuè hǎo, wǒ jiù juéde zìjǐ jìnbù de hěn màn.\",\"vietnamese\":\"Có lẽ vậy. Thấy họ ngày càng tốt hơn, tôi lại cảm thấy mình tiến bộ rất chậm.\",\"start\":22.35,\"end\":30.65,\"is_shadowing_enabled\":true},{\"sentence_id\":\"ep-001-s6\",\"chinese\":\"每个人的时间不一样。别人快，不代表你差。\",\"pinyin\":\"Měi ge rén de shíjiān bù yíyàng. Biérén kuài, bù dàibiǎo nǐ chà.\",\"vietnamese\":\"Thời gian của mỗi người không giống nhau. Người khác nhanh không có nghĩa là bạn kém.\",\"start\":30.65,\"end\":39.12,\"is_shadowing_enabled\":true},{\"sentence_id\":\"ep-001-s7\",\"chinese\":\"可是我还是会着急。\",\"pinyin\":\"Kěshì wǒ háishi huì zháojí.\",\"vietnamese\":\"Nhưng tôi vẫn sẽ sốt ruột.\",\"start\":39.12,\"end\":42.47,\"is_shadowing_enabled\":true},{\"sentence_id\":\"ep-001-s8\",\"chinese\":\"着急很正常。但你可以先做好今天的事。每天进步一点点，就已经很好了。\",\"pinyin\":\"Zháojí hěn zhèngcháng. Dàn nǐ kěyǐ xiān zuò hǎo jīntiān de shì. Měitiān jìnbù yìdiǎndiǎn, jiù yǐjīng hěn hǎo le.\",\"vietnamese\":\"Sốt ruột là bình thường. Nhưng bạn có thể làm tốt việc hôm nay trước. Mỗi ngày tiến bộ một chút đã rất tốt rồi.\",\"start\":42.47,\"end\":54.61,\"is_shadowing_enabled\":true},{\"sentence_id\":\"ep-001-s9\",\"chinese\":\"你说得对。我不应该一直看别人。\",\"pinyin\":\"Nǐ shuō de duì. Wǒ bù yīnggāi yìzhí kàn biérén.\",\"vie audio_word\":\"/audio/words/daily-001-keyword-009.mp3\",\"is_collectable\":true,\"typing_enabled\":true}],\"is_free\":true,\"is_member_only\":false,\"member_cta\":\"想继续练真实语速？解锁更多 1 分钟精品听力。\",\"created_at\":\"2026-06-16\",\"cover_image\":\"/covers/placeholder-listening.svg\",\"audio_main\":\"/audio/main/daily-001-main.mp3\",\"chinese_text\":\"最近我有点儿不开心。怎么了？工作太忙吗？不是。我看到很多朋友都过得很好，可是我好像还没有什么变化。你是不是又在和别人比？可能是吧。看到他们越来越好，我就觉得自己进步得很慢。每个人的时间不一样。别人快，不代表你差。可是我还是会着急。着急很正常。但你可以先做好今天的事。每天进步一点点，就已经很好了。你说得对。我不应该一直看别人。对。你要相信自己，也要给自己一点时间。\",\"pinyin_text\":\"Zuìjìn wǒ yǒudiǎnr bù kāixīn. Zěnme le? Gōngzuò tài máng ma? Bú shì. Wǒ kàndào hěn duō péngyou dōu guò de hěn hǎo, kěshì wǒ hǎoxiàng hái méiyǒu shénme biànhuà. Nǐ shì bú shì yòu zài hé biérén bǐ? Kěnéng shì ba. Kàndào tāmen yuè lái yuè hǎo, wǒ jiù juéde zìjǐ jìnbù de hěn màn. Měi ge rén de shíjiān bù yíyàng. Biérén kuài, bù dàibiǎo nǐ chà. Kěshì wǒ háishi huì zháojí. Zháojí hěn zhèngcháng. Dàn nǐ kěyǐ xiān zuò hǎo jīntiān de shì. Měitiān jìnbù yìdiǎndiǎn, jiù yǐjīng hěn hǎo le. Nǐ shuō de duì. Wǒ bù yīnggāi yìzhí kàn biérén. Duì. Nǐ yào xiāngxìn zìjǐ, yě yào gěi zìjǐ yìdiǎn shíjiān.\",\"vietnamese_translation\":\"Dạo này tôi hơi không vui. Sao vậy? Công việc bận quá à? Không phải. Tôi thấy nhiều bạn bè sống rất tốt, nhưng hình như tôi vẫn chưa có thay đổi gì. Có phải bạn lại đang so sánh mình với người khác không? Có lẽ vậy. Thấy họ ngày càng tốt hơn, tôi lại cảm thấy mình tiến bộ rất chậm. Thời gian của mỗi người không giống nhau. Người khác nhanh không có nghĩa là bạn kém. Nhưng tôi vẫn sẽ sốt ruột. Sốt ruột là bình thường. Nhưng bạn có thể làm tốt việc hôm nay trước. Mỗi ngày tiến bộ một chút đã rất tốt rồi. Bạn nói đúng. Tôi không nên cứ nhìn người khác mãi. Đúng. Bạn phải tin bản thân, cũng phải cho bản thân thêm một chút thời gian.\",\"shadowing_sentences\":[\"ep-001-s1\",\"ep-001-s2\",\"ep-001-s3\",\"ep-001-s4\",\"ep-001-s5\",\"ep-001-s6\",\"ep-001-s7\",\"ep-001-s8\",\"ep-001-s9\",\"ep-001-s10\"],\"typing_words\":[\"通过\",\
